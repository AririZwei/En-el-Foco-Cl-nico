# --- Configuración General del Sitio ---
# ¡Corregido! Quité un espacio en blanco al final de la URL
site_url: https://aririzwei.github.io/En-el-Foco-Cl-nico/

site_name: En el Foco Clínico
site_description: 
site_author: (Fran "Ari" Ariamis Fernández Reyes)


# --- Tema y Apariencia (Material for MkDocs) ---
theme:
    name: material
    
    # --- Logo y Favicon ---
    logo: assets/Logo2.png
    favicon: assets/logo.png

    # --- Esquema de Color (Scheme) y Paleta (Palette) ---
    palette:
      
      # Opciones para el Modo Claro (default)
      - scheme: default
        primary: indigo
        accent: orange
        toggle:
          icon: material/weather-night
          name: Cambiar a modo oscuro

      # Opciones para el Modo Oscuro (slate)
      - scheme: slate
        primary: deep purple
        accent: cyan
        toggle:
          icon: material/weather-sunny
          name: Cambiar a modo claro

    # --- Características (Features) ---
    features:
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - navigation.footer
        - content.social.links
        - pwa.offline         # <-- ¡¡ERROR 2 CORREGIDO!! Faltaba esta línea para la PWA

# --- Navegación (nav) ---
# (Tu sección 'nav:' completa va aquí)
# nav:
